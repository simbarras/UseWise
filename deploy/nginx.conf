server {
    listen 80;
    server_name usewise.live www.usewise.live;

    # Redirect all HTTP to HTTPS (filled in by certbot after SSL setup)
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name usewise.live www.usewise.live;

    # SSL certificates (filled in by certbot)
    ssl_certificate     /etc/letsencrypt/live/usewise.live/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/usewise.live/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # ── Frontend (React static build) ──────────────────────────────────────
    root /var/www/usewise;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;  # SPA fallback
    }

    # ── Backend (FastAPI on 127.0.0.1:8000) ────────────────────────────────
    location /api/ {
        proxy_pass         http://127.0.0.1:8000/;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Allow larger uploads (privacy policy text)
        client_max_body_size 5M;
    }
}
