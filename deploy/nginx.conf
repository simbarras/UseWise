server {
    listen 80;
    server_name usewise.live www.usewise.live;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name usewise.live www.usewise.live;

    ssl_certificate     /etc/letsencrypt/live/usewise.live/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/usewise.live/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # All traffic → web container (which serves static files and proxies /api/)
    location / {
        proxy_pass         http://127.0.0.1:8080;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        client_max_body_size 5M;
    }
}
