services:
  api:
    image: ghcr.io/simbarras/usewise-api:feat-deployment-0.1.1 #TODO: pin to specific version
    env_file:
      - .env
    environment:
      DB_PATH: /data/usewise_feedback.db
    volumes:
      - ./data:/data # SQLite DB persists here
    restart: unless-stopped

  web:
    image: ghcr.io/simbarras/usewise-web:feat-deployment-0.1.1 #TODO: pin to specific version
    ports:
      - "127.0.0.1:8080:80"
    depends_on:
      - api
    restart: unless-stopped
