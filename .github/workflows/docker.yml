name: Build and push Docker images

on:
  push:

env:
  REGISTRY: ghcr.io
  API_IMAGE: ghcr.io/${{ github.repository_owner }}/usewise-api
  API_VERSION: 0.1.1
  WEB_IMAGE: ghcr.io/${{ github.repository_owner }}/usewise-web
  WEB_VERSION: 0.1.1

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Compute image tag
        id: tag
        run: |
          branch=$(echo '${{ github.ref_name }}' | tr '/' '-')
          echo "value=${branch}" >> "$GITHUB_OUTPUT"

      - name: Build and push API image
        uses: docker/build-push-action@v6
        with:
          context: ./api
          push: true
          tags: ${{ env.API_IMAGE }}:${{ steps.tag.outputs.value }}-${{ env.API_VERSION }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push web image
        uses: docker/build-push-action@v6
        with:
          context: ./web
          push: true
          tags: ${{ env.WEB_IMAGE }}:${{ steps.tag.outputs.value }}-${{ env.WEB_VERSION }}
          build-args: |
            VITE_API_URL=https://usewise.live/api
          cache-from: type=gha
          cache-to: type=gha,mode=max
